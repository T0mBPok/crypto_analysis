services:
  neo4j:
    image: neo4j:5-community
    container_name: crypto_neo4j
    ports:
      - "${DB_PORT}:${DB_PORT}"
      - "7474:7474"
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=${DB_USER}/${DB_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    networks:
      - crypto_network

  # api:
