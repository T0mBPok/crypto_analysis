  #     - "${APP_PORT}:${APP_PORT}"
  #   depends_on:
  #     - neo4j
  #   volumes:
  #     - ./app:/app
  #   networks:
  #     - crypto_network

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

networks:
  crypto_network:
    driver: bridge